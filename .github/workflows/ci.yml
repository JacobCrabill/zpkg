name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cold-store-build:
    name: Cold store build
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/jacobcrabill/alpine-zig:0.16.0

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Change if you need git info

      - name: Run All Tests
        run: zig build test

      - name: Save/restore build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: zig-cache-${{ runner.os }}-${{ github.sha }}

      - name: Cold store build
        run: zig build

      - name: Run tests
        run: zig build test

      - name: Determinism check
        run: bash ci/check-determinism.sh

  warm-store-build:
    name: Warm store build
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/jacobcrabill/alpine-zig:0.16.0

    needs: cold-store-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: zig-cache-${{ runner.os }}-${{ github.sha }}

      - name: Warm store build (expect cache hits)
        run: zig build

      - name: Run tests (warm)
        run: zig build test
