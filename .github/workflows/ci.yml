name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cold-store-build:
    name: Cold store build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig 0.16.0
        uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0

      - name: Save/restore build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: zig-cache-${{ runner.os }}-${{ github.sha }}

      - name: Cold store build
        run: zig build

      - name: Run tests
        run: zig build test

      - name: Determinism check
        run: bash ci/check-determinism.sh

  warm-store-build:
    name: Warm store build
    runs-on: ubuntu-latest
    needs: cold-store-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig 0.16.0
        uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: zig-cache-${{ runner.os }}-${{ github.sha }}

      - name: Warm store build (expect cache hits)
        run: zig build

      - name: Run tests (warm)
        run: zig build test
